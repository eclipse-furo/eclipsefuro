syntax = "proto3";

package furo.cube;

import "openapiv3/annotations.proto";

option go_package = "furo/cube;cubepb";
option java_multiple_files = true;
option java_package = "pro.furo.cube";

// Colour is a rgba color
message Colour {
  // the red part of the color
  uint32 red = 1 [(openapi.v3.property) = {
    default: {number: 22}
    maximum: 255
  }];

  // the green part of the color
  uint32 green = 2 [(openapi.v3.property) = {
    default: {number: 34}
    maximum: 255
  }];
  // the blue part of the color
  uint32 blue = 3 [(openapi.v3.property) = {
    default: {number: 88}
    maximum: 255
  }];

  float alpha = 4 [(openapi.v3.property) = {
    default: {number: 1}
    maximum: 1
    format: "positive"
  }];
}
